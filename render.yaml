databases:
  - name: whatsapp-checkout-db
    plan: free
    databaseName: whatsapp_checkout
    user: whatsapp_checkout_user

services:
  - type: web
    name: whatsapp-checkout-nuvemshop
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: RENDER_DATABASE_URL
        fromDatabase:
          name: whatsapp-checkout-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: whatsapp-checkout-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: whatsapp-checkout-db
          property: password
      - key: NUVEMSHOP_APP_ID
        value: "32468"
      - key: NUVEMSHOP_CLIENT_SECRET
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_CATALOG_ID
        sync: false
      - key: WHATSAPP_FLOW_ID
        sync: false
      - key: WHATSAPP_FLOW_PRIVATE_KEY
        sync: false
      - key: WHATSAPP_FLOW_PRIVATE_KEY_PATH
        value: /etc/secrets/flow-private-key.pem
      - key: WHATSAPP_FLOW_CTA
        value: Comprar agora
      - key: WHATSAPP_FLOW_MODE
        value: published
      - key: WHATSAPP_FLOWS_ENABLED
        value: "true"
      - key: WHATSAPP_API_BASE_URL
        value: https://graph.facebook.com/v25.0
      - key: CHECKOUT_MINIMUM_ORDER_TOTAL
        value: "200.00"
      - key: FRONTEND_BASE_URL
        value: https://whatsapp-checkout-nuvemshop.onrender.com/storefront/
      - key: CART_EXPIRATION_MINUTES
        value: "120"
      - key: STOCK_SYNC_ENABLED
        value: "true"
      - key: STOCK_SYNC_INTERVAL_MINUTES
        value: "10"
      - key: ORDER_STATUS_SYNC_ENABLED
        value: "true"
      - key: ORDER_STATUS_SYNC_INTERVAL_MINUTES
        value: "5"
      - key: ORDER_STATUS_SYNC_LOOKBACK_DAYS
        value: "30"
